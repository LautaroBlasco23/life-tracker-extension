<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Screen Time Tracker</title>
    <style>
      body { font-family: sans-serif; width: 300px; padding: 12px; margin: 0; }
      input { width: 100%; padding: 6px; box-sizing: border-box; }
      button { cursor: pointer; }

      .tabs { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 12px; }
      .tab { flex: 1; padding: 8px; text-align: center; border: none; background: none; font-size: 13px; cursor: pointer; color: #666; }
      .tab.active { border-bottom: 2px solid #1a73e8; color: #1a73e8; font-weight: 600; }

      .tab-content { display: none; }
      .tab-content.active { display: block; }

      h4 { margin: 0 0 8px; }

      .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }

      .track-banner { display: flex; align-items: center; justify-content: space-between; background: #e8f5e9; border: 1px solid #81c784; border-radius: 4px; padding: 6px 8px; margin-bottom: 10px; font-size: 12px; }
      .track-banner button { padding: 2px 10px; font-size: 12px; }

      .domain-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
      .domain-row .remove-btn { border: none; background: none; color: #c62828; font-size: 14px; padding: 0 4px; line-height: 1; }

      .add-row { display: flex; gap: 6px; margin-top: 10px; }
      .add-row input { flex: 1; margin: 0; }
      .add-row button { padding: 6px 10px; white-space: nowrap; }

      .setting-label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
      .setting-row { margin-bottom: 12px; }

      .full-btn { width: 100%; padding: 8px; margin-top: 8px; }

      .msg { font-size: 12px; margin-top: 6px; min-height: 16px; padding: 6px 8px; border-radius: 4px; }
      .msg.ok { color: #2e7d32; background: #e8f5e9; }
      .msg.err { color: #c62828; background: #ffebee; }

      .login-msg { font-size: 12px; margin-top: 8px; padding: 8px; border-radius: 4px; display: none; }
      .login-msg.show { display: block; }
      .login-msg.ok { color: #2e7d32; background: #e8f5e9; }
      .login-msg.err { color: #c62828; background: #ffebee; }

      .btn-loading {
        position: relative;
        color: transparent !important;
      }
      .btn-loading::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        top: 50%;
        left: 50%;
        margin-left: -8px;
        margin-top: -8px;
        border: 2px solid #fff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="login-section">
      <h3>Login</h3>
      <label class="setting-label" for="api-host">Backend URL</label>
      <input type="text" id="api-host" placeholder="localhost:8080" style="margin-bottom:10px" />
      <input type="email" id="email" placeholder="Email" style="margin-bottom:6px" />
      <input type="password" id="password" placeholder="Password" style="margin-bottom:6px" />
      <button class="full-btn" id="login-btn" style="margin-top:0">Login</button>
      <div id="login-msg" class="login-msg"></div>
    </div>

    <div id="app-section" style="display:none">
      <div class="tabs">
        <button class="tab active" data-tab="stats">Stats</button>
        <button class="tab" data-tab="sites">Sites</button>
        <button class="tab" data-tab="settings">Settings</button>
      </div>

      <!-- Stats -->
      <div id="tab-stats" class="tab-content active">
        <div id="track-banner"></div>
        <h4>Today's Visits</h4>
        <div id="stats"></div>
        <button class="full-btn" id="logout-btn">Logout</button>
      </div>

      <!-- Sites -->
      <div id="tab-sites" class="tab-content">
        <h4>Tracked Sites</h4>
        <div id="domains-list"></div>
        <div class="add-row">
          <input type="text" id="new-domain" placeholder="e.g. youtube.com" />
          <button id="add-domain-btn">Add</button>
        </div>
        <p class="msg" id="sites-msg"></p>
      </div>

      <!-- Settings -->
      <div id="tab-settings" class="tab-content">
        <h4>Settings</h4>
        <div class="setting-row">
          <label class="setting-label">Backend URL</label>
          <div id="current-api-host" style="font-size:13px;padding:6px;background:#f5f5f5;border-radius:4px;"></div>
        </div>
        <button class="full-btn" id="save-settings-btn" style="margin-top:0">Edit Backend URL</button>
        <p class="msg" id="settings-msg"></p>
      </div>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
